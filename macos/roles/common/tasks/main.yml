---
# roles/common/tasks/main.yml 

# Taps
- name: Install brew TAP packages
  community.general.homebrew_tap:
    name: "{{ item }}"
    state: present
  loop: "{{ brew_tap_packages }}"

# Brew
- name: Install BREW packages
  community.general.homebrew:
    name: "{{ item }}"
    state: present
    update_homebrew: yes
  loop: "{{ brew_packages }}"

# Allow Homebrew pkg-based casks to run /usr/sbin/installer without a TTY password prompt
- name: Allow passwordless installer for Homebrew casks
  become: yes
  copy:
    dest: /etc/sudoers.d/homebrew-casks
    content: "{{ ansible_facts['user_id'] }} ALL=(root) SETENV: NOPASSWD: /usr/sbin/installer\n"
    mode: '0440'
    validate: 'visudo -cf %s'

# Cask
- name: Install brew CASK packages
  community.general.homebrew_cask:
    name: "{{ item }}"
    install_options: 'cask,appdir=/Applications'
    state: present
  loop: "{{ brew_cask_packages }}"

- name: Remove passwordless installer sudoers entry
  become: yes
  file:
    path: /etc/sudoers.d/homebrew-casks
    state: absent

