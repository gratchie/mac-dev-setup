---
# roles/machine_learning/tasks/main.yml

- name: Install Python 3.12 via pyenv
  shell: pyenv install 3.12 --skip-existing

- name: Set Python 3.12 as global default
  shell: pyenv global 3.12

- name: Bootstrap pip, setuptools and wheel
  shell: pyenv exec pip install --upgrade pip setuptools wheel

- name: Install PIP packages
  shell: pyenv exec pip install watchdog pylint python-dotenv requests six urllib3 virtualenv ipython tiktoken black boto3 openai datasets langchain vanna numpy scipy matplotlib jupyter pandas sympy nose anthropic litellm langgraph pydantic-ai instructor sentence-transformers chromadb qdrant-client transformers huggingface-hub mlx-lm langfuse unstructured pypdf markitdown httpx tenacity rich

- name: Install Ollama
  community.general.homebrew_cask:
    name: ollama
    state: present

- name: Install Claude Code
  shell: curl -fsSL https://claude.ai/install.sh | bash
  args:
    creates: /usr/local/bin/claude

- name: Install Cortex Code
  shell: curl -LsS https://ai.snowflake.com/static/cc-scripts/install.sh | sh
